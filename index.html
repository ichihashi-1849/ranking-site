<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ランキング</title>

<style>
body {
  margin: 0;
  background: linear-gradient(black, #200);
  color: white;
  font-family: "游明朝", serif;
  text-align: center;
}

h1 {
  color: gold;
  font-size: 36px;
}

table {
  width: 90%;
  margin: 20px auto;
  border-collapse: collapse;
  background: white;
  color: black;
}

th, td {
  padding: 12px;
  border: 1px solid #999;
}

.top1 { background: gold; }
.top2 { background: silver; }
.top3 { background: #cd7f32; }
</style>
</head>

<body>

<h1>S-1 GRAND PRIX</h1>

<table>
<thead>
<tr>
<th>順位</th>
<th>会社名</th>
<th>ポイント</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

<script>
const sheetID = "18MlaonCthrnt9ZYKHJMoP_gJShXzqbgvuIlgx56JuA8";
const url = `https://opensheet.elk.sh/${sheetID}/DISPLAY`;

fetch(url)
.then(res => res.json())
.then(data => {

  // 数値としてソート（超重要：これやらないとズレる）
  data.sort((a,b) => Number(b.ポイント) - Number(a.ポイント));

  const tbody = document.getElementById("ranking");

  data.slice(0,10).forEach((row, i) => {
    const tr = document.createElement("tr");

    if(i === 0) tr.classList.add("top1");
    if(i === 1) tr.classList.add("top2");
    if(i === 2) tr.classList.add("top3");

    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${row.会社名}</td>
      <td>${row.ポイント}</td>
    `;

    tbody.appendChild(tr);
  });
});
</script>

</body>
</html>

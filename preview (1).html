<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S-1グランプリ2026｜営業ランキング</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at bottom, #400000, #000000 70%);
  color: white;
  font-family: "游明朝", serif;
  text-align: center;
}

/* ロゴ */
.logo {
  margin-top: 20px;
}

.logo img {
  width: 180px;
}

/* タイトル */
h1 {
  color: gold;
  font-size: 40px;
  margin: 10px 0;
  text-shadow: 0 0 10px rgba(255,215,0,0.8);
}

.sub {
  color: #ccc;
  margin-bottom: 20px;
}

/* テーブル */
table {
  width: 90%;
  margin: 20px auto;
  border-collapse: collapse;
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: black;
  color: gold;
}

th, td {
  padding: 12px;
  border: 1px solid #999;
}

/* ランキング色 */
.top1 { background: gold; font-weight: bold; }
.top2 { background: silver; }
.top3 { background: #cd7f32; }

/* 炎っぽい演出 */
body::after {
  content: "";
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 200px;
  background: radial-gradient(circle, rgba(255,100,0,0.4), transparent);
  pointer-events: none;
}
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png" alt="ロゴ">
</div>

<h1>🏆 レイシャス-１ グランプリ2026</h1>
<p class="sub">営業ランキング TOP10</p>

<table>
<thead>
<tr>
<th>順位</th>
<th>会社名</th>
<th>ポイント</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

<script>
const sheetID = "18MlaonCthrnt9ZYKHJMoP_gJShXzqbgvuIlgx56JuA8";
const url = `https://opensheet.elk.sh/${sheetID}/DISPLAY`;

fetch(url)
.then(res => {
  if (!res.ok) throw new Error("データ取得失敗");
  return res.json();
})
.then(data => {

  const tbody = document.getElementById("ranking");

  data
  .sort((a,b)=> Number(b.ポイント)-Number(a.ポイント))
  .slice(0,10)
  .forEach((row,i)=>{

    const tr = document.createElement("tr");

    if(i===0) tr.className="top1";
    if(i===1) tr.className="top2";
    if(i===2) tr.className="top3";

    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${row["会社名"] || "-"}</td>
      <td>${row["ポイント"] || 0}</td>
    `;

    tbody.appendChild(tr);
  });

})
.catch(err=>{
  document.body.innerHTML += `<p style="color:red;">${err.message}</p>`;
});
</script>

</body>
</html>
